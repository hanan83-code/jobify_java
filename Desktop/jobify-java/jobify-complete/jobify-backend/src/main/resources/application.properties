# ── Server ──────────────────────────────────────────────────────
server.port=8080

# ── Runtime Profile ──────────────────────────────────────────────
# Default to local H2 for zero-setup development.
# Use APP_PROFILE=mysql to run with MySQL.
spring.profiles.active=${APP_PROFILE:h2}

# ── JPA / Hibernate ───────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ── JWT ──────────────────────────────────────────────────────────
jwt.secret=Jobify_Super_Secret_Key_2024_DarkBlue
jwt.expiration=86400000

# ── File Upload ──────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=./uploads

# ── Static Resources ─────────────────────────────────────────────
spring.web.resources.static-locations=file:./uploads/,classpath:/static/
spring.mvc.static-path-pattern=/uploads/**

# ── CORS ─────────────────────────────────────────────────────────
app.cors.allowed-origins=http://localhost:3000

# ── Logging ──────────────────────────────────────────────────────
logging.level.com.jobify=DEBUG
